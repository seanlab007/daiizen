name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Set Cloudflare Pages env vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Set server-side environment variables for Cloudflare Pages Functions
          npx wrangler pages secret put MAOYAN_LINK_SECRET \
            --project-name=daiizen \
            <<< "${{ secrets.MAOYAN_LINK_SECRET }}"

          npx wrangler pages secret put SUPABASE_URL \
            --project-name=daiizen \
            <<< "${{ secrets.SUPABASE_URL }}"

          npx wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY \
            --project-name=daiizen \
            <<< "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # No path arg: wrangler reads pages_build_output_dir from wrangler.toml
          # This ensures functions/ directory is included alongside the static assets
          command: pages deploy --project-name=daiizen --branch=main
